name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Prepare GitHub Pages artifact
        run: |
          cp dist/adrian-cabello/browser/index.csr.html dist/adrian-cabello/browser/404.html
          cp CNAME dist/adrian-cabello/browser/CNAME
          for route in login admin dashboard dashboard/proyectos gastos tareas/nueva movimiento-rapido; do
            mkdir -p "dist/adrian-cabello/browser/$route"
            cp dist/adrian-cabello/browser/index.csr.html "dist/adrian-cabello/browser/$route/index.html"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/adrian-cabello/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
