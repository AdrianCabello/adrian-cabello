<div class="w-full px-2 py-4 md:px-6">
  <div
    class="mx-auto max-w-7xl rounded-2xl border border-gray-700 bg-gray-800/80 p-6 shadow-2xl backdrop-blur-sm">
    <div class="space-y-8">
      <!-- Certifications -->
      <h2
        class="mb-6 flex items-center justify-between text-2xl font-semibold text-white">
        Certifications & Training
      </h2>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <article
          *ngFor="let cert of certifications"
          class="flex h-full flex-col justify-between rounded-xl border border-gray-600 bg-gray-700/50 p-5 shadow-md">
          <div class="mb-3 flex">
            <img
              *ngIf="cert.logo"
              [src]="cert.logo"
              alt="{{ cert.title }} logo"
              class="mr-3 mt-1 h-10 w-10 rounded-md" />
            <div>
              <h4 class="font-medium text-white">
                {{ cert.title }}
              </h4>
              <p class="text-sm text-gray-400">
                {{ cert.institution }}
              </p>
            </div>
          </div>

          <div class="mt-auto flex items-center justify-between">
            <div class="text-xs text-gray-400">
              {{ cert.date }}
            </div>
            <p-tag [severity]="cert.color === 'red' ? 'danger' : 'info'">
              <a
                *ngIf="cert.url"
                [href]="cert.url"
                target="_blank"
                rel="noopener noreferrer"
                class="cursor-pointer text-inherit hover:underline">
                {{ cert.badge }}
              </a>
              <span *ngIf="!cert.url">{{ cert.badge }}</span>
            </p-tag>
          </div>
        </article>
      </div>
    </div>
    <!-- Education Cards -->
    <h2
      class="mb-6 mt-10 flex items-center justify-between text-2xl font-semibold text-white">
      Academic Background
    </h2>
    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <article
        *ngFor="let edu of educationList"
        class="h-full rounded-xl border border-gray-600 bg-gray-700/50 p-5 shadow-md">
        <div class="flex items-start gap-4">
          <div>
            <h3 class="text-xl font-semibold text-white">
              {{ edu.title }}
            </h3>
            <p class="mt-1 text-gray-300">
              {{ edu.institution }}
            </p>
            <p-tag class="mt-2 inline-flex" [value]="edu.date" severity="info"></p-tag>
            <p class="mt-3 text-gray-400">
              {{ edu.description }}
            </p>
          </div>
        </div>
      </article>
    </div>
  </div>
</div>
